# Cloudflare router Worker. Replace `example.com` with your apex domain
# and `YOUR_ACCOUNT_ID` with your Cloudflare account id before deploying.
name = "site-router"
main = "src/index.ts"
compatibility_date = "2025-01-01"
account_id = "YOUR_ACCOUNT_ID"

[[r2_buckets]]
binding = "SITES"
bucket_name = "sites"

# Catch every subdomain of the apex.
[[routes]]
pattern = "*example.com/*"
zone_name = "example.com"

# Serve the apex itself too.
[[routes]]
pattern = "example.com/*"
zone_name = "example.com"
