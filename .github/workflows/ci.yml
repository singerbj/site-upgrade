name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  check:
    name: Lint, format, audit, typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run format:check
      - run: npm run audit
      - run: npm run build
