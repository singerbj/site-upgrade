name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      all:
        description: "Force redeploy of every site and the worker"
        type: boolean
        default: false

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  detect:
    name: Detect changed sites
    runs-on: ubuntu-latest
    outputs:
      sites: ${{ steps.detect.outputs.sites }}
      worker: ${{ steps.detect.outputs.worker }}
      any: ${{ steps.detect.outputs.any }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - id: detect
        shell: bash
        env:
          BASE_SHA: ${{ github.event_name == 'workflow_dispatch' && inputs.all && '' || github.event.before }}
          HEAD_SHA: ${{ github.sha }}
        run: |
          OUT=$(node --experimental-strip-types scripts/changed-sites.ts)
          echo "Detected: $OUT"
          SITES=$(echo "$OUT" | jq -c '.sites')
          WORKER=$(echo "$OUT" | jq -r '.worker')
          ANY=$(echo "$OUT" | jq -r 'if (.sites | length) > 0 or .worker then "true" else "false" end')
          echo "sites=$SITES" >> "$GITHUB_OUTPUT"
          echo "worker=$WORKER" >> "$GITHUB_OUTPUT"
          echo "any=$ANY" >> "$GITHUB_OUTPUT"

  deploy-sites:
    name: Deploy ${{ matrix.site.name }}
    needs: detect
    if: needs.detect.outputs.sites != '[]' && needs.detect.outputs.sites != ''
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        site: ${{ fromJson(needs.detect.outputs.sites) }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Build ${{ matrix.site.packageName }}
        run: pnpm --filter ${{ matrix.site.packageName }} build
      - name: Upload to R2
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
        run: |
          node --experimental-strip-types scripts/deploy-site.ts \
            --hostname=${{ matrix.site.hostname }} \
            --dir=${{ matrix.site.dir }}/dist

  deploy-worker:
    name: Deploy router worker
    needs: detect
    if: needs.detect.outputs.worker == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: pnpm --filter site-router deploy
